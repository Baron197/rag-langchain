name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: fake
      EMBEDDING_PROVIDER: fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Tests (keyless)
        run: pytest -q
      - name: Retrieval eval gate
        run: python -m eval.run_eval --no-ragas --min-recall 0.8
